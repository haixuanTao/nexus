[package]
name = "nexus-examples-3d"
version = "0.4.0"
authors = ["Sébastien Crozet <developer@crozet.re>"]
edition = "2024"

[dependencies]
glamx = { version = "0.1", default-features = false }
nexus_testbed3d = { path = "../nexus_testbed3d" }
nexus3d = { path = "../nexus3d" }
rapier3d = "0.32"
Inflector = "0.11"
kiss3d = "0.40"
oorandom = "11"
rand = "0.9"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[[bin]]
name = "all_examples3"
path = "all_examples3.rs"
