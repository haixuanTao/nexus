[workspace]
members = [
    "crates/nexus2d",
    "crates/nexus3d",
    "crates/nexus_testbed2d",
    "crates/nexus_testbed3d",
    "crates/examples2d",
    "crates/examples3d",
    "crates/nexus_rbd2d",
    "crates/nexus_rbd3d",
    "crates/nexus_rbd_shaders2d",
    "crates/nexus_rbd_shaders3d",
    "crates/nexus_mpm_shaders2d",
    "crates/nexus_mpm_shaders3d",
    "crates/nexus_mpm2d",
    "crates/nexus_mpm3d",
    "crates/nexus_fem_shaders2d",
    "crates/nexus_fem_shaders3d",
    "crates/nexus_fem2d",
    "crates/nexus_fem3d",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/dimforge/nexus"

[workspace.features]
default = ["webgpu", "f32"]
dim2 = []
dim3 = []
f32 = []
f64 = []
webgpu = ["khal/webgpu"]
cpu = []  # Enables CPU shader execution
cpu-parallel = ["cpu"]  # Enables parallel workgroup dispatch on CPU (via rayon)
from_rapier = []  # Enables conversion from rapier types

[workspace.dependencies]
glamx = { version = "0.1", default-features = false, features = ["nostd-libm", "bytemuck"] }
include_dir = "0.7"
khal = { version = "0.2", features = ["derive"] }
vortx = "0.2"
bytemuck = { version = "1", features = ["derive"] }
encase = "0.12"
web-time = "1"
static_assertions = "1"

# Shaders deps
khal-derive = { path = "../khal/crates/khal-derive" }
spirv-std = { git = "https://github.com/Rust-GPU/rust-gpu.git", rev = "7ad4c4dd3ec2a4a87c47b036469e2c6f4081242a" }
vortx-shaders = { path = "../vortx/vortx-shaders", default-features = false }
unroll = "0.1"
crunchy = "0.2.4"

[workspace.lints]
rust.unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("dim2", "dim3", "from_rapier", "cpu"))',
] }

[patch.crates-io]
glamx = { git = "https://github.com/dimforge/glamx", branch = "bytemuck"}
parry2d = { git = "https://github.com/dimforge/parry", branch = "spirv-compat"}
parry3d = { git = "https://github.com/dimforge/parry", branch = "spirv-compat"}
#khal = { git = "https://github.com/dimforge/khal", branch = "main"}
#khal-derive = { git = "https://github.com/dimforge/khal", branch = "main"}
#vortx = { git = "https://github.com/dimforge/vortx", branch = "main"}

#glamx = { path = "../glamx" }
#kiss3d = { path = "../kiss3d" }
#parry2d = { path = "../parry/crates/parry2d" }
#parry3d = { path = "../parry/crates/parry3d" }
khal = { path = "../khal/crates/khal" }
khal-derive = { path = "../khal/crates/khal-derive" }
vortx = { path = "../vortx" }
