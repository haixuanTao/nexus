[workspace]
members = [
    "crates/nexus2d",
    "crates/nexus3d",
    "crates/nexus_testbed2d",
    "crates/nexus_testbed3d",
    "crates/examples2d",
    "crates/examples3d",
    "crates/nexus-shaders2d",
    "crates/nexus-shaders3d",
    "crates/nexus-mpm-shaders2d",
    "crates/nexus-mpm-shaders3d",
    "crates/nexus-mpm2d",
    "crates/nexus-mpm3d",
    "crates/nexus_mpm_testbed2d",
    "crates/nexus_mpm_testbed3d",
    "crates/mpm_examples2d",
    "crates/mpm_examples3d",
]
resolver = "2"

[package]
name = "nexus"
authors = ["Sébastien Crozet <sebcrozet@dimforge.com>"]
description = "Cross-platform GPU-accelerated rigid-body physics using rust-gpu."
repository = "https://github.com/dimforge/nexus"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[features]
default = ["webgpu", "f32"]
dim2 = []
dim3 = []
f32 = []
f64 = []
webgpu = ["khal/webgpu"]
vulkan = ["khal/vulkan"]
cpu = []  # Enables CPU shader execution
from_rapier = []  # Enables conversion from rapier types

[dependencies]
glamx = { version = "0.1", default-features = false, features = ["nostd-libm", "bytemuck"] }
include_dir = "0.7"
khal = { version = "0.2", features = ["derive"] }
vortx = "0.2"
bytemuck = { version = "1", features = ["derive"] }
encase = "0.12"

[lints]
rust.unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("dim2", "dim3", "from_rapier"))',
] }

[patch.crates-io]
khal = { path = "../khal/crates/khal" }
khal-derive = { path = "../khal/crates/khal-derive" }
glamx = { path = "../glamx" }
vortx = { path = "../vortx" }
kiss3d = { path = "../kiss3d" }
parry2d = { path = "../parry/crates/parry2d" }
parry3d = { path = "../parry/crates/parry3d" }
